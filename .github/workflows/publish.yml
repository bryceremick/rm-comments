name: publish

# Push to main = publish everywhere. Each surface job is idempotent (checks
# its own published state), so pushes without a version bump only run tests,
# and a partially failed run can be re-run safely.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          V=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          P=$(jq -r .version .claude-plugin/plugin.json)
          if [[ "$V" != "$P" ]]; then
            echo "::error::Cargo.toml version ($V) != .claude-plugin/plugin.json version ($P) — keep them in sync"
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add ${{ matrix.target }}
      - run: cargo test --target ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          V="${{ needs.version.outputs.version }}"
          bin=rm-comments
          [[ "${{ matrix.target }}" == *windows* ]] && bin=rm-comments.exe
          mkdir pkg
          cp "target/${{ matrix.target }}/release/$bin" pkg/
          tar -C pkg -czf "rm-comments-v$V-${{ matrix.target }}.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: rm-comments-*.tar.gz

  github-release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          merge-multiple: true
          path: dist
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ needs.version.outputs.version }}"
          if gh release view "v$V" >/dev/null 2>&1; then
            echo "release v$V already exists — skipping"
          else
            gh release create "v$V" dist/*.tar.gz --title "v$V" --notes "rm-comments $V"
          fi

  crates-io:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish if version not on crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          V="${{ needs.version.outputs.version }}"
          if curl -fsSL -A "rm-comments-ci (github.com/bryceremick/rm-comments)" \
               "https://crates.io/api/v1/crates/rm-comments" 2>/dev/null \
             | jq -e --arg v "$V" '.versions[] | select(.num == $v)' >/dev/null; then
            echo "version $V already on crates.io — skipping"
          else
            # --allow-dirty: a fresh CI checkout can only be "dirty" from
            # cargo regenerating Cargo.lock (e.g. after a version bump that
            # didn't update the lockfile); never from real uncommitted work
            cargo publish --allow-dirty
          fi

  homebrew:
    needs: [version, github-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update tap formula
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          gh auth setup-git
          ./scripts/update-brew-formula.sh "v${{ needs.version.outputs.version }}"
